name: Build and Release Desktop Executables

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact: forgeflow-agent-studio-windows
            ext: zip
          - os: macos-latest
            artifact: forgeflow-agent-studio-macos
            ext: zip
          - os: ubuntu-latest
            artifact: forgeflow-agent-studio-linux
            ext: tar.gz
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller

      - name: Build executable
        run: pyinstaller build/pyinstaller.spec --noconfirm --clean

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Compress-Archive -Path dist/forgeflow-agent-studio/* -DestinationPath dist/${{ matrix.artifact }}.zip

      - name: Package artifact (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          cd dist
          if [ "${{ runner.os }}" = "Linux" ]; then
            tar -czf ${{ matrix.artifact }}.tar.gz forgeflow-agent-studio
          else
            zip -r ${{ matrix.artifact }}.zip forgeflow-agent-studio
          fi

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}.zip
            dist/${{ matrix.artifact }}.tar.gz

  publish:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/forgeflow-agent-studio-windows.zip
            artifacts/**/forgeflow-agent-studio-macos.zip
            artifacts/**/forgeflow-agent-studio-linux.tar.gz
          generate_release_notes: true
